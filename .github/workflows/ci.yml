name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Type-check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
        env:
          # Builds must not depend on secrets; the app degrades to sample data
          # without keys, so CI verifies the no-key path compiles and renders.
          NEXT_TELEMETRY_DISABLED: "1"
